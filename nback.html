<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Back & 2-Back ワーキングメモリ課題</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css">
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; line-height: 1.6; }
        .jspsych-content { max-width: 800px; }
        .stimulus { font-size: 80px; font-weight: bold; margin: 40px 0; height: 100px; }
        .guide { color: #666; font-size: 1rem; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .data-table th { background-color: #f4f4f4; }
    </style>
</head>
<body></body>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRBKyXhkDv6Z08c3ShrqsX8Gr-rMiyrPL3SKfKJrN6HyP_RR4iDIDzWdvAqQ0G6hQU/exec';

    const jsPsych = initJsPsych({
        on_finish: function() {
            const displayElement = jsPsych.getDisplayElement();
            displayElement.innerHTML = '<h2>データを送信中です...</h2>';

            const allData = jsPsych.data.get().filterCustom(d => d.condition !== undefined).values();
            
            // データをFormDataとして送信（CORSを回避しやすい形式）
            const formData = new FormData();
            formData.append('data', JSON.stringify(allData));
            
            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                let html = '<h2>実験終了。ご協力ありがとうございました。</h2>';
                html += '<table class="data-table"><tr><th>条件</th><th>試行</th><th>正誤</th><th>反応時間</th></tr>';
                allData.forEach(d => {
                    html += `<tr><td>${d.condition}</td><td>${d.trial_index+1}</td><td>${d.correct ? '正解' : '不正解'}</td><td>${d.rt ? Math.round(d.rt) : '-'}ms</td></tr>`;
                });
                html += '</table>';
                displayElement.innerHTML = html;
            }).catch(error => {
                console.error("送信エラー:", error);
                displayElement.innerHTML = '<h2>送信処理が完了しました。ご協力ありがとうございました。</h2>';
            });
        }
    });

    const participant_info = {
        type: jsPsychSurveyText,
        questions: [{ prompt: '参加者IDを入力してください', required: true, name: 'participant_id' }],
        on_finish: (data) => {
            jsPsych.data.addProperties({ participant_id: data.response.participant_id });
        }
    };

    function generateNBack(n) {
        const chars = ['A', 'B', 'C', 'D', 'E'];
        let sequence = [];
        let targetPositions = [];
        while(targetPositions.length < 6) {
            let p = Math.floor(Math.random() * (20 - n)) + n;
            if(!targetPositions.includes(p)) targetPositions.push(p);
        }
        
        for(let i=0; i<20; i++) {
            if(i < n) {
                sequence.push(chars[Math.floor(Math.random() * chars.length)]);
            } else if(targetPositions.includes(i)) {
                sequence.push(sequence[i-n]);
            } else {
                let next;
                do { next = chars[Math.floor(Math.random() * chars.length)]; } 
                while(next === sequence[i-n]);
                sequence.push(next);
            }
        }
        return sequence;
    }

    function createBlock(n, conditionName, instruction) {
        const seq = generateNBack(n);
        let block = [];
        
        block.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<p style="font-size: 1.2rem;">${instruction}</p>`,
            choices: ['開始する']
        });

        seq.forEach((char, index) => {
            block.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: `<div class="guide">${n}つ前と比較してください。F:同じ / J:違う</div><div class="stimulus">${char}</div>`,
                choices: ['同じ', '違う'],
                stimulus_duration: 500,
                trial_duration: 2000,
                response_ends_trial: true,
                on_load: function() {
                    jsPsych.pluginAPI.getKeyboardResponse({
                        callback_function: (info) => {
                            let choice = jsPsych.pluginAPI.compareKeys(info.key, 'f') ? 0 : (jsPsych.pluginAPI.compareKeys(info.key, 'j') ? 1 : -1);
                            if (choice !== -1) {
                                const buttons = document.querySelectorAll('.jspsych-btn');
                                if (buttons[choice]) { buttons[choice].click(); }
                            }
                        },
                        valid_responses: ['f', 'j'],
                        persist: false
                    });
                },
                data: { 
                    condition: conditionName, 
                    trial_index: index, 
                    presented_char: char, 
                    target_condition: (index >= n && char === seq[index-n]) ? 'same' : 'diff' 
                },
                on_finish: (data) => {
                    const ans = data.response === 0 ? 'same' : 'diff';
                    data.correct = (ans === data.target_condition);
                }
            });
        });
        return block;
    }

    const timeline = [
        participant_info,
        ...createBlock(1, '1-back', '1-Back課題を開始します。'),
        {
            type: jsPsychHtmlButtonResponse,
            stimulus: '<h2>休憩</h2><p>前半終了です。次は2-Back課題です。<br>「2つ前」と同じなら「同じ」を選択してください。</p>',
            choices: ['2-Backを開始する']
        },
        ...createBlock(2, '2-back', '2-Back課題を開始します。')
    ];

    jsPsych.run(timeline);
</script>
</html>
